<app-toast [message]="toastMessage" [type]="toastType" [visible]="showToast"></app-toast>
<h2>Withdraw Money</h2>
<h3>Account: {{selectedAccount}}</h3>
<label>Amount</label>
<br>
<input type="number" [(ngModel)]="withdraw.amount">
<br><br>
<button type="button" class="theme-btn" (click)="withdrawMoney()">Withdraw</button>
<p>{{message}}</p>
