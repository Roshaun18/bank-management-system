<h2>Transfer Money</h2>
<h3>Transfer From: {{selectedAccount}}</h3>
<br><br>
<label>To Account</label>
<br>
<input type="text" [(ngModel)]="transfer.to_account">
<br><br>
<label>Amount</label>
<br>
<input type="number" [(ngModel)]="transfer.amount">
<br><br>
<button type="button" class="theme-btn" (click)="transferMoney()">Transfer</button>
<p>{{message}}</p>
