<app-toast [message]="toastMessage" [type]="toastType" [visible]="showToast"></app-toast>
<h2>Deposit Money</h2>
<h3>Account: {{selectedAccount}}</h3>
<label>Amount</label>
<br>
<input type="number" [(ngModel)]="deposit.amount">
<br><br>
<button type="button" class="theme-btn" (click)="depositMoney()">Deposit</button>
<p>{{message}}</p>
