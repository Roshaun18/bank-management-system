<h2>Change Password</h2>
<label>Current Password</label>
<br>
<input type="password" [(ngModel)]="passwordData.old_password">
<br><br>
<label>New Password</label>
<br>
<input type="password" [(ngModel)]="passwordData.new_password">
<br><br>
<label>Confirm Password</label>
<br>
<input type="password" [(ngModel)]="passwordData.confirm_password">
<br><br>
<button type="button" class="theme-btn" (click)="changePassword()">Update Password</button>
<p>{{message}}</p>
