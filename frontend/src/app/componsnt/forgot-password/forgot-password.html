<div class="forgot-container">
<div class="forgot-card">
<h2>Forgot Password</h2>
<p>{{message}}</p>

@if(currentStep===1){
    <label>Username</label>
    <br>
    <input type="text" [(ngModel)]="username">
    <br><br>
    <button type="button" class="theme-btn" (click)="generateOtp()">Generate Otp</button>
}

@if(currentStep===2){
    <label>Otp</label>
    <br>
    <input type="text" [(ngModel)]="otp">
    <br><br>
    <button type="button" class="theme-btn" (click)="verifyOtp()">Verify</button>
}

@if(currentStep===3){
    <label>New Password</label>
    <br>
    <input type="password" [(ngModel)]="newPassword">
    <br><br>
    <label>Confirm Password</label>
    <br>
    <input type="password" [(ngModel)]="confirmPassword">
    <br><br>
    <button type="button" class="theme-btn" (click)="resetPassword()">Reset</button>
}

@if(currentStep===4){
    <h3>Password Reset Successful</h3>
    <p>You can now login using your new password</p>
}
</div>
</div>
